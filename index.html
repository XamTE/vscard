<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="김현우 웹명함" />
  <title>김현우 | 웹명함</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>

<body>
  <main class="card" aria-label="웹명함 카드">
    <div class="cover" aria-hidden="true"></div>

    <section class="content">
      <div class="profile">
        <div class="photo-box">
          <img
            class="photo"
            src="./profile.png"
            alt="김현우 프로필 이미지"
            width="104"
            height="104"
          />
        </div>

        <span class="badge">Game QA Engineer</span>
      </div>

      <h1 class="name">김현우</h1>
      <p class="role">작은 이상도 놓치지 않는 꼼꼼한 QA 엔지니어를 지향합니다.</p>

      <div class="divider" role="presentation"></div>

      <ul class="info-list">
        <li class="info-item">
          <span class="icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="info-text">
            <span class="label">Email</span>
            <a class="value" href="mailto:khwoo990@naver.com">khwoo990@naver.com</a>
          </span>
        </li>

        <li class="info-item">
          <span class="icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M7.5 4h9A1.5 1.5 0 0 1 18 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 18.5v-13A1.5 1.5 0 0 1 7.5 4Z" stroke="currentColor" stroke-width="2"/>
              <path d="M10 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="info-text">
            <span class="label">Phone</span>
            <a class="value" href="tel:+821023986117">010-2398-6117</a>
          </span>
        </li>
      </ul>

      <div class="actions">
        <a class="button primary" href="mailto:khwoo990@naver.com">이메일 보내기</a>
        <a class="button primary" href="tel:+821023986117">전화 걸기</a>
        <button
          class="button"
          id="copyEmailButton"
          type="button"
          data-copy-value="khwoo990@naver.com"
          data-success-message="이메일을 복사했습니다."
        >
          이메일 복사
        </button>
        <button
          class="button"
          id="copyPhoneButton"
          type="button"
          data-copy-value="010-2398-6117"
          data-success-message="휴대폰 번호를 복사했습니다."
        >
          연락처 복사
        </button>
      </div>

      <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
    </section>
  </main>
</body>
</html>
